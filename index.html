<!-- LÓGICA JAVASCRIPT: Validación en tiempo real en el Frontend -->
<script>
document.getElementById('tipo_documento').addEventListener('change', function() {
    const inputDoc = document.getElementById('numero_documento');
    
    if (this.value === 'P') {
        // Configuración para Pasaporte Internacional
        inputDoc.type = 'text';
        inputDoc.placeholder = "Ej: PAS987654";
        inputDoc.pattern = "[a-zA-Z0-9]+"; // Permite letras y números
        inputDoc.title = "El pasaporte debe contener solo letras y números.";
    } else {
        // Configuración para Cédula (V o E)
        inputDoc.type = 'text';
        inputDoc.placeholder = "Ej: 12345678";
        inputDoc.pattern = "[0-9]+"; // Fuerza a que sean solo números
        inputDoc.title = "La cédula debe contener solo números.";
    }
});
</script>

</body>
